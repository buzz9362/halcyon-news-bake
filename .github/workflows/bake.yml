name: Bake article MP3s

on:
  schedule:
    # Every 30 minutes, offset by 15 so it doesn't pile up on the top of the hour
    # when every other free cron in the world also fires.
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      force_app:
        description: 'Re-bake (ignore R2 cache + cap) for this app slug, or "all". Empty = normal incremental bake.'
        required: false
        default: ''

concurrency:
  group: bake
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bake
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: halcyon-news-tts
          FORCE_APP: ${{ github.event.inputs.force_app }}
        run: python bake.py
